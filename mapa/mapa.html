<!DOCTYPE html>
<html>
<head>
  <title>GPS Map</title>
  <meta charset="utf-8" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    #map {
      height: 100vh;
      width: 100%;
    }

    body {
  margin: 0;
}

#container {
  display: flex;
  height: 100vh;
}

#panel {
  width: 260px;
  background: #0b0f14;
  color: white;
  padding: 10px;
  font-family: monospace;
  border-right: 2px solid #222;
}

#map {
  flex: 1;
}

.card {
  background: #000;
  border: 1px solid #333;
  margin-bottom: 10px;
  padding: 10px;
}

.card p {
  margin: 0;
  font-size: 12px;
  color: #aaa;
}

.card span {
  font-size: 28px;
  font-weight: bold;
  color: #00ff88;
}
  </style>
</head>
<body>
<div id="container">
  <div id="panel">
    <h3>Telemetry</h3>

    <!-- ENVIRONMENT -->
    <div class="section">
      <h4 class="title env">ENVIRONMENT</h4>

      <div class="card"><p>Temp (°C)</p><span id="temp">--</span></div>
      <div class="card"><p>Pressure (hPa)</p><span id="pressure">--</span></div>
      <div class="card"><p>Humidity (%)</p><span id="humidity">--</span></div>
    </div>

    <!-- GPS -->
    <div class="section">
      <h4 class="title gps">GPS</h4>

      <div class="card"><p>Latitude</p><span id="lat">--</span></div>
      <div class="card"><p>Longitude</p><span id="lon">--</span></div>
      <div class="card"><p>Altitude (m)</p><span id="alt">--</span></div>
      <div class="card"><p>Satellites</p><span id="sat">--</span></div>
    </div>

    <!-- TIME -->
    <div class="section">
      <h4 class="title time">TIME</h4>

      <div class="card"><p>UTC</p><span id="time">--</span></div>

    </div>

<div id="map"></div>



<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  //  Create map
  var map = L.map('map').setView([0, 0], 2);

  //  Add tiles
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  //  Marker (initially null)
  // a ver si esto se commitea
 let marker = null;
let polyline = L.polyline([], { color: "red" }).addTo(map);

async function updateGPS() {
  const res = await fetch("/api/telemetry");
  const data = await res.json();

  if (!data || data.length === 0) return;

  const last = data[data.length - 1];
  const point = [last.lat, last.lon];

  // update path
  const path = data.map(p => [p.lat, p.lon]);
  polyline.setLatLngs(path);


  document.getElementById("temp").innerText = last.temp ?? "--";
  document.getElementById("pressure").innerText = last.pressure ?? "--";
  document.getElementById("humidity").innerText = last.humidity ?? "--";

  document.getElementById("alt").innerText = last.alt ?? "--";

  document.getElementById("lat").innerText = last.lat ?? "--";
  document.getElementById("lon").innerText = last.lon ?? "--";

  document.getElementById("sat").innerText = last.sat ?? "--";

  document.getElementById("time").innerText = last.time ?? "--";
  // update marker
  if (!marker) {
    marker = L.marker(point).addTo(map);
    map.setView(point, 15);
  } else {
    marker.setLatLng(point);
  }
}

setInterval(updateGPS, 2000);
</script>

</body>
</html>
